<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Hierarchy Visualizer</title>
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    :root {
      --bg:#0a0f1a; --panel:#0f172a; --panel2:#111a2e; --border:#1e293b;
      --text:#e2e8f0; --muted:#64748b; --accent:#3b82f6; --accent2:#60a5fa;
      --warn:#f59e0b; --danger:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:radial-gradient(1000px 600px at 20% -10%, #142036 0%, var(--bg) 60%);
      color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    }
    .app{max-width:1280px;margin:0 auto;padding:32px 24px 80px}
    header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;flex-wrap:wrap;gap:8px}
    h1{margin:0;font-size:28px;letter-spacing:-0.02em}
    h2{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
    .muted{color:var(--muted);font-size:13px;font-weight:400}
    code{background:#111a2e;border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:14px;padding:18px}
    .card.full{margin-bottom:20px}
    .card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;gap:12px}
    textarea{width:100%;background:#050a14;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;line-height:1.55;resize:vertical;outline:none}
    textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
    .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{background:var(--accent);color:white;border:0;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13px}
    button:hover{background:var(--accent2)}
    button:disabled{opacity:0.5;cursor:not-allowed}
    button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    button.ghost:hover{background:var(--panel2)}
    .error{margin-top:10px;padding:10px 12px;background:#3a0e0e;border:1px solid #7f1d1d;border-radius:8px;color:#fecaca;font-size:13px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
    @media (max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
    .stat{background:#050a14;border:1px solid var(--border);border-radius:10px;padding:10px 12px}
    .stat.warn{border-color:#78350f}
    .stat.danger{border-color:#7f1d1d}
    .stat-v{font-size:22px;font-weight:700;letter-spacing:-0.02em}
    .stat-l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
    #cy{height:460px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#050a14}
    .empty{color:var(--muted);text-align:center;padding:60px 0;border:1px dashed var(--border);border-radius:12px}
    .details{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    @media (max-width:700px){.details{grid-template-columns:1fr}}
    .pillbox-title{font-size:13px;margin-bottom:8px}
    .pills{display:flex;flex-wrap:wrap;gap:6px}
    .pill{background:#050a14;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:ui-monospace,Menlo,monospace;font-size:12px}
    .pill.warn{border-color:#78350f;color:#fcd34d}
    .hierarchies{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
    .hier{background:#050a14;border:1px solid var(--border);border-radius:10px;padding:10px 12px}
    .hier.cyc{border-color:#7f1d1d;background:#1b0a0a}
    .hier-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
    .badge{font-size:11px;padding:2px 7px;background:var(--accent);color:white;border-radius:999px}
    .badge.danger{background:var(--danger)}
    .hier pre{margin:0;font-size:12px;color:#cbd5e1;white-space:pre-wrap;word-break:break-word}
    .server{background:#050a14;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;overflow:auto;max-height:420px;margin:0}
    .api-label{font-size:12px;color:var(--muted)}
    .api-label input{background:#050a14;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;width:340px;font-family:ui-monospace,Menlo,monospace}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>BFHL <span class="muted">· hierarchy visualizer</span></h1>
      <label class="api-label">API: <input id="api" value="https://bfhl-api.bajaj.workers.dev" /></label>
    </header>

    <div class="grid">
      <section class="card">
        <div class="card-header">
          <h2>Input</h2>
          <span class="muted">one edge per line — live-parsed as you type</span>
        </div>
        <textarea id="input" rows="16" spellcheck="false"></textarea>
        <div class="actions">
          <button id="submit">POST /bfhl</button>
          <button id="reset" class="ghost">Reset sample</button>
          <button id="clear" class="ghost">Clear</button>
        </div>
        <div id="error" class="error" style="display:none"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Live preview</h2>
          <span class="muted">computed client-side — mirrors the API</span>
        </div>
        <div class="stats" id="stats"></div>
        <div id="cy"></div>
      </section>
    </div>

    <section class="card full">
      <div class="card-header">
        <h2>Details</h2>
        <span class="muted">invalid / duplicate / hierarchies</span>
      </div>
      <div class="details" id="details"></div>
      <div class="hierarchies" id="hier"></div>
    </section>

    <section class="card full" id="server-card" style="display:none">
      <div class="card-header">
        <h2>Server response</h2>
        <span class="muted">raw JSON from <code>/bfhl</code></span>
      </div>
      <pre class="server" id="server"></pre>
    </section>
  </div>

<script>
const SAMPLE = [
  "A->B","A->C","B->D","C->E","E->F",
  "X->Y","Y->Z","Z->X",
  "P->Q","Q->R",
  "G->H","G->H","G->I",
  "hello","1->2","A->"
].join("\n");

const $ = (id) => document.getElementById(id);
const inputEl = $("input");
const apiEl = $("api");
inputEl.value = SAMPLE;

const NODE_EDGE = /^[A-Z]->[A-Z]$/;

function processEdges(raws) {
  const invalid = [], duplicates = [];
  const seenEdge = new Set(), seenDup = new Set();
  const firstParent = new Map(), childList = new Map();
  const nodeOrder = [], nodeSeen = new Set();
  const touch = n => { if (!nodeSeen.has(n)) { nodeSeen.add(n); nodeOrder.push(n); } };

  for (const raw of raws) {
    if (typeof raw !== "string") { invalid.push(String(raw)); continue; }
    const e = raw.trim();
    if (!NODE_EDGE.test(e)) { invalid.push(raw); continue; }
    const p = e[0], c = e[3];
    // Self-loops (X->X) are valid single-node cycles, not invalid.
    if (seenEdge.has(e)) {
      if (!seenDup.has(e)) { seenDup.add(e); duplicates.push(e); }
      continue;
    }
    seenEdge.add(e);
    if (firstParent.has(c)) continue;
    firstParent.set(c, p);
    touch(p); touch(c);
    const k = childList.get(p);
    if (k) k.push(c); else childList.set(p, [c]);
  }

  const uf = new Map();
  const find = x => {
    let r = uf.get(x) ?? x;
    if (r === x) { if (!uf.has(x)) uf.set(x, x); return x; }
    r = find(r); uf.set(x, r); return r;
  };
  const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) uf.set(ra, rb); };
  for (const n of nodeOrder) find(n);
  for (const [c, p] of firstParent) union(p, c);

  const compOrder = [], compMembers = new Map();
  for (const n of nodeOrder) {
    const r = find(n);
    const arr = compMembers.get(r);
    if (arr) arr.push(n);
    else { compMembers.set(r, [n]); compOrder.push(r); }
  }

  const hierarchies = [];
  let total_trees = 0, total_cycles = 0;
  let bestRoot = null, bestDepth = -1;

  for (const key of compOrder) {
    const members = compMembers.get(key);
    const roots = members.filter(m => !firstParent.has(m));
    if (roots.length === 0) {
      const root = [...members].sort()[0];
      hierarchies.push({ root, tree: {}, has_cycle: true });
      total_cycles++;
      continue;
    }
    const root = roots[0];
    const build = n => {
      const out = {};
      const kids = childList.get(n);
      if (kids) for (const k of kids) out[k] = build(k);
      return out;
    };
    const tree = { [root]: build(root) };
    const depthOf = n => {
      const kids = childList.get(n);
      if (!kids || !kids.length) return 1;
      let best = 0;
      for (const k of kids) { const d = depthOf(k); if (d > best) best = d; }
      return 1 + best;
    };
    const depth = depthOf(root);
    hierarchies.push({ root, tree, depth });
    total_trees++;
    if (depth > bestDepth || (depth === bestDepth && bestRoot !== null && root < bestRoot)) {
      bestDepth = depth; bestRoot = root;
    }
  }

  return {
    hierarchies, invalid_entries: invalid, duplicate_edges: duplicates,
    summary: { total_trees, total_cycles, largest_tree_root: bestRoot ?? "" }
  };
}

function acceptedEdgesFor(raws) {
  const seen = new Set(), fp = new Map(), out = [];
  for (const raw of raws) {
    if (typeof raw !== "string") continue;
    const e = raw.trim();
    if (!NODE_EDGE.test(e)) continue;
    const p = e[0], c = e[3];
    if (seen.has(e)) continue;
    seen.add(e);
    if (fp.has(c)) continue;
    fp.set(c, p);
    out.push([p, c]);
  }
  return out;
}

let cy;
function renderGraph(result, rawData) {
  const edges = acceptedEdgesFor(rawData);
  const cyclicRoots = new Set(result.hierarchies.filter(h => h.has_cycle).map(h => h.root));

  // BFS component from each cyclic root to mark cyclic nodes.
  const adj = new Map();
  for (const [p, c] of edges) {
    (adj.get(p) ?? adj.set(p, []).get(p)).push(c);
    (adj.get(c) ?? adj.set(c, []).get(c)).push(p);
  }
  const cyclicNodes = new Set();
  for (const r of cyclicRoots) {
    const stack = [r];
    while (stack.length) {
      const x = stack.pop();
      if (cyclicNodes.has(x)) continue;
      cyclicNodes.add(x);
      for (const y of (adj.get(x) ?? [])) stack.push(y);
    }
  }

  const nodeSet = new Set();
  const els = [];
  for (const [p, c] of edges) {
    if (!nodeSet.has(p)) { nodeSet.add(p); els.push({ data: { id: p, cyc: cyclicNodes.has(p) } }); }
    if (!nodeSet.has(c)) { nodeSet.add(c); els.push({ data: { id: c, cyc: cyclicNodes.has(c) } }); }
    const cyc = cyclicNodes.has(p) && cyclicNodes.has(c);
    els.push({ data: { id: `${p}->${c}`, source: p, target: c, cyc } });
  }

  const container = document.getElementById("cy");
  if (!edges.length) {
    container.innerHTML = '<div class="empty">No valid edges yet — type some like <code>A-&gt;B</code> to see the graph.</div>';
    cy = null;
    return;
  }
  container.innerHTML = "";

  cy = cytoscape({
    container,
    elements: els,
    style: [
      { selector: "node", style: {
        "background-color": "#0b1b2b", "border-width": 1.5, "border-color": "#3b82f6",
        "label": "data(id)", "color": "#dbeafe", "text-valign": "center", "text-halign": "center",
        "font-weight": 600, "font-size": 14, "width": 36, "height": 36
      }},
      { selector: "node[?cyc]", style: {
        "background-color": "#3a0e0e", "border-color": "#ef4444", "color": "#fecaca"
      }},
      { selector: "edge", style: {
        "width": 2, "line-color": "#64748b", "target-arrow-color": "#64748b",
        "target-arrow-shape": "triangle", "curve-style": "bezier"
      }},
      { selector: "edge[?cyc]", style: {
        "line-color": "#ef4444", "target-arrow-color": "#ef4444", "width": 2.5,
        "line-style": "dashed"
      }}
    ],
    layout: { name: "dagre", rankDir: "TB", nodeSep: 30, rankSep: 55 }
  });
}

function render() {
  const raws = inputEl.value.split("\n").map(s => s.replace(/\r$/, "")).filter(s => s.length > 0);
  const r = processEdges(raws);

  $("stats").innerHTML = [
    ["Trees", r.summary.total_trees, ""],
    ["Cycles", r.summary.total_cycles, "danger"],
    ["Largest root", r.summary.largest_tree_root || "—", ""],
    ["Invalid", r.invalid_entries.length, "warn"],
    ["Duplicates", r.duplicate_edges.length, "warn"],
  ].map(([l, v, t]) => `<div class="stat ${t}"><div class="stat-v">${v}</div><div class="stat-l">${l}</div></div>`).join("");

  const pill = (items, tone) =>
    items.length === 0 ? '<span class="muted">none</span>'
    : items.map(it => `<span class="pill ${tone}">${escapeHtml(it || "<empty>")}</span>`).join("");

  $("details").innerHTML = `
    <div class="pillbox"><div class="pillbox-title">Invalid entries <span class="muted">(${r.invalid_entries.length})</span></div><div class="pills">${pill(r.invalid_entries, "warn")}</div></div>
    <div class="pillbox"><div class="pillbox-title">Duplicate edges <span class="muted">(${r.duplicate_edges.length})</span></div><div class="pills">${pill(r.duplicate_edges, "warn")}</div></div>
  `;

  $("hier").innerHTML = r.hierarchies.map(h => `
    <div class="hier ${h.has_cycle ? "cyc" : ""}">
      <div class="hier-head"><strong>root:</strong> ${escapeHtml(h.root)} ${h.has_cycle ? '<span class="badge danger">cycle</span>' : `<span class="badge">depth ${h.depth}</span>`}</div>
      <pre>${escapeHtml(JSON.stringify(h.tree, null, 2))}</pre>
    </div>
  `).join("");

  renderGraph(r, raws);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

async function submit() {
  const btn = $("submit"); btn.disabled = true; btn.textContent = "Calling…";
  $("error").style.display = "none";
  $("server-card").style.display = "none";
  try {
    const data = inputEl.value.split("\n").map(s => s.replace(/\r$/, "")).filter(s => s.length > 0);
    const res = await fetch(apiEl.value.replace(/\/$/, "") + "/bfhl", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    $("server").textContent = JSON.stringify(json, null, 2);
    $("server-card").style.display = "";
  } catch (e) {
    $("error").textContent = "Error: " + (e.message || "Request failed");
    $("error").style.display = "";
  } finally {
    btn.disabled = false; btn.textContent = "POST /bfhl";
  }
}

inputEl.addEventListener("input", render);
$("submit").addEventListener("click", submit);
$("reset").addEventListener("click", () => { inputEl.value = SAMPLE; render(); });
$("clear").addEventListener("click", () => { inputEl.value = ""; render(); });
render();
</script>
</body>
</html>
